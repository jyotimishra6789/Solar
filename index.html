<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella | Explore The Universe</title>
    
    <link rel="stylesheet" href="stella.css">
    
    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    
    <!-- Frosted Glass Header -->
    <header>
        <a href="index.html" class="brand">STELLA</a>
        <nav class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="apod.html">APOD</a>
            <a href="news.html">News</a>
            <!-- Placeholders for future pages -->
            <a href="events.html" style="opacity:0.5">Events</a>
            <a href="eonet.html" style="opacity:0.5">EONET</a>
        </nav>
        <div class="menu-toggle material-symbols-outlined" onclick="toggleMenu()">menu</div>
    </header>

    <!-- Parallax Hero Section -->
    <main class="hero-section">
        <div class="hero-content">
            <h1 class="text-gradient">Explore: The Universe</h1>
            <p>Journey through the cosmos with real-time astronomy data, stunning imagery, and the latest deep space news.</p>
        </div>
        
        <div class="planets-container">
            <div class="planet-wrapper moon">
                <img src="moon.png" alt="Moon" class="moon-img">
                <span class="planet-label">MOON</span>
            </div>
            
            <div class="planet-wrapper sun">
                <img src="sun.png" alt="Sun" class="sun-img">
                <span class="planet-label">SUN</span>
            </div>
            
            <div class="planet-wrapper earth">
                <img src="earth.png" alt="Earth" class="earth-img">
                <span class="planet-label">EARTH</span>
            </div>
        </div>
    </main>

    <!-- GSAP & Core Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="stella.js"></script>
</body>
</html>
