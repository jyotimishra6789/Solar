<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella | Astronomy Picture Of The Day</title>
    <link rel="stylesheet" href="stella.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    
    <header>
        <a href="index.html" class="brand">STELLA</a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="apod.html" class="active">APOD</a>
            <a href="news.html">News</a>
            <a href="events.html" style="opacity:0.5">Events</a>
            <a href="eonet.html" style="opacity:0.5">EONET</a>
        </nav>
        <div class="menu-toggle material-symbols-outlined" onclick="toggleMenu()">menu</div>
    </header>

    <div class="apod-container" id="apod-container">
        <!-- Background element for immersive blur effect -->
        <img id="apod-bg" src="" alt="" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: blur(30px) brightness(0.3); opacity: 0; transition: opacity 1.5s ease;">
        
        <div id="loader" class="loader"><div class="spinner"></div></div>
        
        <div id="apod-content" style="display: none;">
            <div class="apod-card" id="apod-card">
                <h2 id="title">Loading...</h2>
                <h3>Date: <span id="date"></span></h3>
                
                <!-- Media could be image or video -->
                <div id="media-container"></div>
                
                <p id="explanation"></p>
            </div>
        </div>
    </div>

    <!-- GSAP & Core Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="stella.js"></script>
    <script>
        // Init APOD
        document.addEventListener("DOMContentLoaded", fetchAPOD);
    </script>
</body>
</html>
